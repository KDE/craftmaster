[tox]
minversion = 4.1.3
envlist = format,lint,reuse,sort-imports

[testenv:lint]
description = runs flake8
skip_install = true
deps = flake8==7.1.1
commands = flake8 .

[testenv:check-imports]
description = runs isort --check
skip_install = true
deps = isort==5.13.2
commands = isort --check --profile black .

[testenv:reuse]
description = runs 'reuse lint'
skip_install = true
deps = reuse
commands = reuse lint

[testenv:sort-imports]
description = runs isort
skip_install = true
deps = isort==5.13.2
commands = isort --profile black .

[testenv:format]
description = runs black
skip_install = true
deps = black==23.11.0
commands = black .
