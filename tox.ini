[tox]
minversion = 4.1.3
envlist = check-imports,format,format_ruff,lint,lint_ruff,reuse,sort-imports

[testenv:check-imports]
description = runs isort --check
skip_install = true
deps = isort==5.13.2
commands = isort --check --profile black .

[testenv:format]
description = runs black
skip_install = true
deps = black==23.11.0
commands = black .

[testenv:format_ruff]
description = runs 'ruff format'
skip_install = true
deps = ruff==0.15.20
commands = ruff format

[testenv:lint]
description = runs flake8
skip_install = true
deps = flake8==7.1.1
commands = flake8 .

[testenv:lint_ruff]
description = runs 'ruff check'
skip_install = true
deps = ruff==0.15.20
commands = ruff check --fix

[testenv:reuse]
description = runs 'reuse lint'
skip_install = true
deps = reuse
commands = reuse lint

[testenv:sort-imports]
description = runs isort
skip_install = true
deps = isort==5.13.2
commands = isort --profile black .

